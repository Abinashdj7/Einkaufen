name: Server CI

on:
  push:
    branches: [master]
    paths:
      - 'e-commerce/Server/**'
      - '.github/workflows/server-ci.yml'
  pull_request:
    branches: [master]
    paths:
      - 'e-commerce/Server/**'
      - '.github/workflows/server-ci.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e-commerce/Server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run unit tests
        run: mvn -B clean test

      - name: Run integration tests
        run: mvn -B failsafe:integration-test failsafe:verify

      - name: Build JAR
        run: mvn -B package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-jar
          path: e-commerce/Server/target/*.jar
          retention-days: 7
