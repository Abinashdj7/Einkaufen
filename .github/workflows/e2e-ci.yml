name: E2E CI

on:
  push:
    branches: [master]
    paths:
      - 'e-commerce/Client/**'
      - '.github/workflows/e2e-ci.yml'
  pull_request:
    branches: [master]
    paths:
      - 'e-commerce/Client/**'
      - '.github/workflows/e2e-ci.yml'
  workflow_dispatch:

jobs:
  e2e:
    name: Cypress E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e-commerce/Client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: e-commerce/Client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress E2E tests
        run: npm run e2e:run

      - name: Upload Cypress screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: e-commerce/Client/cypress/screenshots/
          retention-days: 7
