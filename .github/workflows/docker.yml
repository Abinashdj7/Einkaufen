name: Docker Build & Push

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set lowercase image owner
        id: image_owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build & push client image
        uses: docker/build-push-action@v6
        with:
          context: e-commerce
          file: e-commerce/Dockerfile.client
          push: true
          tags: |
            ghcr.io/${{ steps.image_owner.outputs.owner }}/nouveau-ecommerce-client:latest
            ghcr.io/${{ steps.image_owner.outputs.owner }}/nouveau-ecommerce-client:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push server image
        uses: docker/build-push-action@v6
        with:
          context: e-commerce
          file: e-commerce/Dockerfile.server
          push: true
          tags: |
            ghcr.io/${{ steps.image_owner.outputs.owner }}/nouveau-ecommerce-server:latest
            ghcr.io/${{ steps.image_owner.outputs.owner }}/nouveau-ecommerce-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
