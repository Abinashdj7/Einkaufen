spring.application.name=Nouveau-ecommerce-test

# H2 DataSource Configuration for Testing
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=USER
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Point replica at the same H2 instance so both DataSourceConfig beans use H2
spring.datasource.replica.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=USER

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (optional for debugging)
spring.h2.console.enabled=true

# Logging Configuration for Tests
logging.level.root=WARN
logging.level.com.Abinash.Nouveauecommerce=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN

# Server port
server.port=8080

# JWT signing secret used only for integration tests - not a real secret
jwt.secret=integration-test-only-jwt-signing-secret-do-not-use-in-production-1234567890

# CORS
app.cors.allowed-origins=http://localhost:5173

# No default admin account is provisioned during tests
app.admin.password=

# Razorpay Configuration
razorpay.api.key=test_key
razorpay.api.secret=test_secret

# Debug mode
debug=false
