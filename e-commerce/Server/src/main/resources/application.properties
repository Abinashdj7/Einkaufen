spring.application.name=Nouveau-ecommerce

# DataSource Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/ecommerce?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.Abinash.Nouveauecommerce=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# Log file path
logging.file.name=logs/nouveau-ecommerce.log
logging.file.max-size=10MB
logging.file.max-history=30

# Server port
server.port=8080

# JWT signing secret - MUST be provided via the JWT_SECRET environment variable in any
# shared/production environment. If left blank, a random key is generated at startup
# (tokens will not survive a restart). Never hardcode a real secret here.
jwt.secret=${JWT_SECRET:}

# CORS - comma separated list of origins allowed to call this API
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Default administrator account, provisioned on first startup if not already present.
# Leave ADMIN_PASSWORD unset to skip admin account creation entirely.
app.admin.email=${ADMIN_EMAIL:admin@nouveau-ecommerce.com}
app.admin.password=${ADMIN_PASSWORD:}

# Razorpay Configuration
razorpay.api.key=${RAZORPAY_API_KEY:demo_key}
razorpay.api.secret=${RAZORPAY_API_SECRET:demo_secret}

# Debug mode
debug=false
