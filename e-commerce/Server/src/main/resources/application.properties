spring.application.name=Nouveau-ecommerce

# DataSource Configuration
spring.datasource.url=jdbc:mysql://mysql:3306/ecommerce?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=rootpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
# Enable SQL logging for debugging data flow
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.Abinash.Nouveauecommerce=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Log file path
logging.file.name=logs/nouveau-ecommerce.log
logging.file.max-size=10MB
logging.file.max-history=30

# Server port
server.port=8080

# Security
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# Razorpay Configuration
razorpay.api.key=demo_key
razorpay.api.secret=demo_secret

# Debug mode
debug=false
