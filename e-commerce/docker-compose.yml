version: '3.8'

services:

  # ── Primary MySQL node (all writes go here) ──────────────────────────────
  mysql-primary:
    image: mysql:8.0
    container_name: ecommerce-mysql-primary
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme123}
      MYSQL_DATABASE: ecommerce
    command: >
      --server-id=1
      --log-bin=mysql-bin
      --binlog-format=ROW
      --gtid-mode=ON
      --enforce-gtid-consistency=ON
    volumes:
      - mysql_primary_data:/var/lib/mysql
      - ./docker/mysql/primary-init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Replica MySQL node (read traffic + failover reads) ───────────────────
  mysql-replica:
    image: mysql:8.0
    container_name: ecommerce-mysql-replica
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme123}
      # No MYSQL_DATABASE here — the database is replicated from primary,
      # and the entrypoint's CREATE DATABASE would conflict with --super-read-only
    command: >
      --server-id=2
      --relay-log=relay-bin
      --gtid-mode=ON
      --enforce-gtid-consistency=ON
    volumes:
      - mysql_replica_data:/var/lib/mysql
    ports:
      - "3307:3306"
    depends_on:
      mysql-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── One-shot container that wires replication between primary and replica ─
  mysql-setup:
    image: mysql:8.0
    container_name: ecommerce-mysql-setup
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme123}
    volumes:
      - ./docker/mysql/setup-replication.sh:/setup-replication.sh
    entrypoint: ["bash", "/setup-replication.sh"]
    depends_on:
      mysql-primary:
        condition: service_healthy
      mysql-replica:
        condition: service_healthy
    restart: "no"

  # ── Spring Boot API server ────────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: ecommerce-server
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-primary:3306/ecommerce?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_REPLICA_URL: jdbc:mysql://mysql-replica:3306/ecommerce?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-changeme123}
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-long-random-string-generated-via-openssl-rand-base64-64}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@nouveau-ecommerce.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme123}
      RAZORPAY_API_KEY: ${RAZORPAY_API_KEY:-rzp_test_dummykey1234}
      RAZORPAY_API_SECRET: ${RAZORPAY_API_SECRET:-dummysecret1234567890}
    ports:
      - "8080:8080"
    depends_on:
      mysql-setup:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── React / Nginx client ──────────────────────────────────────────────────
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: ecommerce-client
    ports:
      - "3001:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  mysql_primary_data:
  mysql_replica_data:
